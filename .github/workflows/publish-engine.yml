name: Publish NPM Packages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-engine.yml'
      - 'packages/deck-engine/**'
      - 'packages/create-deckio/**'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: '@deckio/deck-engine'
            path: 'packages/deck-engine'
          - name: '@deckio/create-deck-project'
            path: 'packages/create-deckio'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install workspace dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Check if version already exists on npm
        id: check
        working-directory: ${{ matrix.package.path }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "package_version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published - skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} not found - will publish"
          fi

      - name: Publish package to npm
        if: steps.check.outputs.exists == 'false'
        working-directory: ${{ matrix.package.path }}
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          npm publish --access public --provenance
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
