name: Publish NPM Packages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-engine.yml'
      - 'packages/deck-engine/**'
      - 'packages/create-deckio/**'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: '@deckio/deck-engine'
            path: 'packages/deck-engine'
            releases_dir: 'deck-engine'
          - name: '@deckio/create-deck-project'
            path: 'packages/create-deckio'
            releases_dir: 'create-deck-project'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install workspace dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Check if version already exists on npm
        id: check
        working-directory: ${{ matrix.package.path }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "package_version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published - skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} not found - will publish"
          fi

      - name: Publish package to npm
        if: steps.check.outputs.exists == 'false'
        working-directory: ${{ matrix.package.path }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.package_version }}"
          PACKAGE_NAME="${{ steps.check.outputs.package_name }}"
          RELEASES_DIR="${{ matrix.package.releases_dir }}"
          TAG="${RELEASES_DIR}/v${VERSION}"
          NOTES_FILE="releases/${RELEASES_DIR}/v${VERSION}.md"

          # Use curated release notes if available, otherwise auto-generate from commits
          if [ -f "$NOTES_FILE" ]; then
            BODY=$(cat "$NOTES_FILE")
          else
            BODY="## ${PACKAGE_NAME} v${VERSION}

          Published to npm on $(date -u +%Y-%m-%d).

          **Auto-generated** — no curated release notes found at \`${NOTES_FILE}\`.

          ### Commits since last release
          $(git log --oneline -20 -- "${{ matrix.package.path }}")"
          fi

          # Create a lightweight tag and GitHub Release
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" \
            --title "${PACKAGE_NAME} v${VERSION}" \
            --notes "$BODY" \
            --latest=false
